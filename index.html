function generateCode(name, scores) {
  const total = Object.values(scores).reduce((a, b) => a + b, 0);
  const ts = Date.now().toString(36).slice(-4).toUpperCase();
  const initials = name.trim().split(/\s+/).map(w => w[0]).join("").toUpperCase().slice(0, 3);
  return `${initials}-L39-${total}-${ts}`;
}

// ─── SVG: Unit Circle Highlight ───────────────────────────────────────────────
function UnitCircleSVG({ highlightRange, color, label }) {
  const r = 80;
  const cx = 110, cy = 110;
  const angles = highlightRange || [];
  
  // Draw highlighted arc
  const startAngle = angles[0] || 0;
  const endAngle = angles[1] || 0;
  const startRad = -startAngle * Math.PI / 180;
  const endRad = -endAngle * Math.PI / 180;
  
  const x1 = cx + r * Math.cos(startRad);
  const y1 = cy + r * Math.sin(startRad);
  const x2 = cx + r * Math.cos(endRad);
  const y2 = cy + r * Math.sin(endRad);
  const largeArc = Math.abs(endAngle - startAngle) > 180 ? 1 : 0;
  const sweep = endAngle > startAngle ? 0 : 1;
  
  return (
    <svg viewBox="0 0 220 220" style={{ width: "100%", maxWidth: 200 }}>
      {/* Grid */}
      <line x1={cx} y1={10} x2={cx} y2={210} stroke="rgba(255,255,255,0.1)" strokeWidth="1" />
      <line x1={10} y1={cy} x2={210} y2={cy} stroke="rgba(255,255,255,0.1)" strokeWidth="1" />
      {/* Circle */}
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="1.5" />
      {/* Highlighted arc */}
      {angles.length === 2 && (
        <path d={`M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} ${sweep} ${x2} ${y2}`} fill="none" stroke={color} strokeWidth="4" strokeLinecap="round" opacity="0.8" />
      )}
      {/* Labels */}
      <text x={cx + r + 8} y={cy + 4} fill="rgba(255,255,255,0.4)" fontSize="10" fontFamily="'JetBrains Mono'">0</text>
      <text x={cx - 4} y={cy - r - 6} fill="rgba(255,255,255,0.4)" fontSize="10" fontFamily="'JetBrains Mono'" textAnchor="middle">π/2</text>
      <text x={cx - r - 12} y={cy + 4} fill="rgba(255,255,255,0.4)" fontSize="10" fontFamily="'JetBrains Mono'" textAnchor="end">π</text>
      <text x={cx - 4} y={cy + r + 14} fill="rgba(255,255,255,0.4)" fontSize="10" fontFamily="'JetBrains Mono'" textAnchor="middle">3π/2</text>
      {/* Label */}
      {label && <text x={cx} y={20} fill={color} fontSize="11" fontWeight="bold" fontFamily="'DM Sans'" textAnchor="middle">{label}</text>}
    </svg>
  );
}

// ─── SVG: Graph of inverse function ──────────────────────────────────────────
function InverseGraphSVG({ fn, color, label, xRange, yRange }) {
  const w = 260, h = 180, pad = 30;
  const gw = w - 2*pad, gh = h - 2*pad;
  const [xMin, xMax] = xRange;
  const [yMin, yMax] = yRange;
  
  const toX = (x) => pad + (x - xMin) / (xMax - xMin) * gw;
  const toY = (y) => pad + (yMax - y) / (yMax - yMin) * gh;
  
  const points = [];
  const steps = 100;
  for (let i = 0; i <= steps; i++) {
    const x = xMin + (xMax - xMin) * i / steps;
    const y = fn(x);
    if (y !== null && isFinite(y) && y >= yMin && y <= yMax) {
      points.push(`${toX(x)},${toY(y)}`);
    }
  }
  
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", maxWidth: 260 }}>
      {/* Grid lines */}
      <line x1={pad} y1={toY(0)} x2={w-pad} y2={toY(0)} stroke="rgba(255,255,255,0.15)" strokeWidth="1" />
      <line x1={toX(0)} y1={pad} x2={toX(0)} y2={h-pad} stroke="rgba(255,255,255,0.15)" strokeWidth="1" />
      {/* Curve */}
      <polyline points={points.join(" ")} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" />
      {/* Label */}
      <text x={w - pad - 4} y={pad + 14} fill={color} fontSize="10" fontWeight="bold" fontFamily="'DM Sans'" textAnchor="end">{label}</text>
    </svg>
  );
}

function MCSection({ onNext, score, setScore, scoreKey, questions, icon, title, subtitle, part, showExplanation = true, termField, extraContent }) {
  const [answers, setAnswers] = useState({});
  const [revealed, setRevealed] = useState({});
  const allDone = Object.keys(revealed).length === questions.length;

  function select(qi, oi) { if (revealed[qi] !== undefined) return; setAnswers(a => ({ ...a, [qi]: oi })); }
  function check(qi) { if (answers[qi] === undefined) return; setRevealed(r => ({ ...r, [qi]: true })); }

  useEffect(() => {
    if (allDone) {
      const pts = questions.reduce((s, q, i) => s + (answers[i] === q.correct ? 1 : 0), 0);
      setScore(sc => ({ ...sc, [scoreKey]: pts }));
    }
  }, [allDone]);

  return (
    <div style={{ animation: "fadeUp .5s ease" }}>
      <SectionHeader icon={icon} title={title} subtitle={subtitle} part={part} />
      {extraContent}
      {questions.map((q, qi) => (

          {q.setup && <Callout color={C.indigo} title="Setup" style={{ marginBottom: 12 }}>{q.setup}</Callout>}
          {q.options.map((opt, oi) => (
            <OptionButton key={oi} text={opt} selected={answers[qi] === oi} correct={oi === q.correct} revealed={!!revealed[qi]} onClick={() => select(qi, oi)} />
          ))}
          {!revealed[qi] && answers[qi] !== undefined && <button onClick={() => check(qi)} style={checkBtnStyle(C.blue)}>Check Answer</button>}

      )}
    </div>
  );
}

    let pts = 0;
    EXIT_TICKET.forEach((q, qi) => {
      if (q.type === "mc") { if (answers[qi] === q.correct) pts++; }
      else { if ((answers[`fill-${qi}`] || "").trim().replace(/\s/g,"") === q.answer.replace(/\s/g,"")) pts++; }
    });
    setScore(sc => ({ ...sc, exit: pts }));
  }
  const allAnswered = EXIT_TICKET.every((q, qi) => q.type === "mc" ? answers[qi] !== undefined : (answers[`fill-${qi}`] || "").trim() !== "");

  return (
    <div style={{ animation: "fadeUp .5s ease" }}>
      <SectionHeader icon="🎫" title="Exit Ticket" subtitle="Final check! Answer ALL questions then submit. One chance only." />
      <Callout color={C.coral} title="Important">Answer every question before submitting. You cannot change answers after!</Callout>
      {EXIT_TICKET.map((q, qi) => (
        <div key={qi} style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 14, padding: "18px 20px", marginBottom: 16, animation: `fadeUp .4s ease ${qi * 0.08}s both` }}>
          <div style={{ fontSize: 11, color: C.teal, fontWeight: 800, textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 4 }}>Question {qi + 1}</div>
          <div style={{ fontSize: 15, fontWeight: 700, color: "#fff", marginBottom: 12 }}>{q.question}</div>
          {q.type === "mc" && q.options.map((opt, oi) => (
            <OptionButton key={oi} text={opt} selected={answers[qi] === oi} correct={oi === q.correct} revealed={checked} onClick={() => !checked && setAnswers(a => ({ ...a, [qi]: oi }))} />
          ))}
          {q.type === "fill" && (
            <div>
              <input value={answers[`fill-${qi}`] || ""} onChange={e => setAnswers(a => ({ ...a, [`fill-${qi}`]: e.target.value }))} disabled={checked} placeholder="Type your answer"
                style={{ ...inputStyle, width: 160, borderColor: checked ? ((answers[`fill-${qi}`] || "").trim().replace(/\s/g,"") === q.answer.replace(/\s/g,"") ? C.green : C.coral) : "rgba(255,255,255,0.15)" }} />
              {checked && (answers[`fill-${qi}`] || "").trim().replace(/\s/g,"") !== q.answer.replace(/\s/g,"") && <div style={{ marginTop: 6, fontSize: 13, color: C.coral }}>Correct: <strong>{q.answer}</strong></div>}
            </div>
          )}
        </div>
      ))}
      {!checked && <div style={{ textAlign: "center", marginTop: 16 }}><button onClick={doCheck} disabled={!allAnswered} style={{ ...nextBtnStyle, opacity: allAnswered ? 1 : 0.35, cursor: allAnswered ? "pointer" : "not-allowed" }}>Submit Exit Ticket</button></div>}
      {checked && (
        <div style={{ textAlign: "center", marginTop: 16, animation: "popIn .4s ease" }}>
          <div style={{ color: C.green, fontSize: 15, fontWeight: 700, marginBottom: 14 }}>Exit ticket submitted! {score.exit || 0}/{EXIT_TICKET.length} correct</div>
          <button onClick={onNext} style={nextBtnStyle}>See My Results →</button>
        </div>
      )}
    </div>
  );
}

// ─── RESULTS ────────────────────────────────────────────────────────────────

function ResultsSection({ score, studentName, onRestart }) {
  const [copied, setCopied] = useState(false);
  const sections = [
    { key: "warmup", label: "Warm Up", total: WARMUP_QUESTIONS.length, icon: "🔥" },
    { key: "arcsin_table", label: "sin⁻¹ Table", total: ARCSIN_TABLE_ANGLES.length, icon: "📊" },
    { key: "arcsin_eval", label: "sin⁻¹ Evaluate", total: ARCSIN_EVAL.length, icon: "🎯" },
    { key: "arccos_table", label: "cos⁻¹ Table", total: ARCCOS_TABLE_ANGLES.length, icon: "📊" },
    { key: "arccos_eval", label: "cos⁻¹ Evaluate", total: ARCCOS_EVAL.length, icon: "🎯" },
    { key: "arctan_table", label: "tan⁻¹ Table", total: ARCTAN_TABLE_ANGLES.length, icon: "📊" },
    { key: "arctan_eval", label: "tan⁻¹ Evaluate", total: ARCTAN_EVAL.length, icon: "🎯" },
    { key: "domain_range", label: "Domain & Range", total: DOMAIN_RANGE_Q.length, icon: "📏" },
    { key: "calculator", label: "Calculator", total: CALCULATOR_Q.length, icon: "🔢" },
    { key: "properties", label: "Inverse Properties", total: PROPERTIES_Q.length, icon: "🔄" },
    { key: "composites", label: "Composites", total: COMPOSITES_Q.length, icon: "📐" },
    { key: "algebraic", label: "Algebraic", total: ALGEBRAIC_Q.length, icon: "✏️" },
    { key: "application", label: "Applications", total: APPLICATION_Q.length, icon: "✈️" },
    { key: "mixed", label: "Mixed Practice", total: MIXED_PRACTICE.length, icon: "🔥" },
    { key: "exit", label: "Exit Ticket", total: EXIT_TICKET.length, icon: "🎫" },
  ];
  const totalPts = sections.reduce((s, sec) => s + (score[sec.key] || 0), 0);
  const totalMax = sections.reduce((s, sec) => s + sec.total, 0);
  const pct = Math.round((totalPts / totalMax) * 100);
  const code = generateCode(studentName, score);
  let grade = "Keep Practicing!", gradeColor = C.coral, emoji = "💪";
  if (pct >= 90) { grade = "Inverse Trig Master!"; gradeColor = C.green; emoji = "🏆"; }
  else if (pct >= 75) { grade = "Great Job!"; gradeColor = C.blue; emoji = "⭐"; }
  else if (pct >= 60) { grade = "Good Effort!"; gradeColor = C.gold; emoji = "👍"; }

  function copyResults() {
    const lines = [`INVERSE TRIG FUNCTIONS — LESSON 3.9 WORKSHEET RESULTS`, `Student: ${studentName}`, `Date: ${new Date().toLocaleDateString()}`, `Code: ${code}`, ``, `Overall: ${totalPts}/${totalMax} (${pct}%)`, `Grade: ${grade}`, ``, `SECTION BREAKDOWN:`, ...sections.map(s => `  ${s.label}: ${score[s.key] || 0}/${s.total}`)];
    navigator.clipboard.writeText(lines.join("\n")).then(() => setCopied(true));
    setTimeout(() => setCopied(false), 2500);
  }

  return (
    <div style={{ textAlign: "center", maxWidth: 540, margin: "0 auto", animation: "fadeUp .6s ease" }}>
      <div style={{ fontSize: 56, marginBottom: 8, animation: "float 3s ease-in-out infinite" }}>{emoji}</div>
      <h2 style={{ fontSize: 28, fontWeight: 900, color: gradeColor, marginBottom: 4 }}>{grade}</h2>
      <div style={{ fontSize: 15, color: "rgba(255,255,255,0.5)", marginBottom: 24 }}>{studentName}'s Results</div>
      <div style={{ position: "relative", width: 170, height: 170, margin: "0 auto 28px" }}>
        <svg viewBox="0 0 170 170" style={{ transform: "rotate(-90deg)" }}>
          <circle cx="85" cy="85" r="72" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="12" />
          <circle cx="85" cy="85" r="72" fill="none" stroke={gradeColor} strokeWidth="12" strokeDasharray={(pct / 100) * 452 + " 452"} strokeLinecap="round" style={{ transition: "stroke-dasharray 1.2s ease" }} />
        </svg>
        <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
          <div style={{ fontSize: 38, fontWeight: 900, color: "#fff" }}>{pct}%</div>
          <div style={{ fontSize: 13, color: "rgba(255,255,255,0.4)" }}>{totalPts}/{totalMax}</div>
        </div>
      </div>
      <div style={{ textAlign: "left", marginBottom: 24 }}>
        {sections.map((sec, si) => {
          const pts = score[sec.key] || 0;
          const p = sec.total > 0 ? Math.round((pts / sec.total) * 100) : 0;
          return (
            <div key={sec.key} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, marginBottom: 6, animation: `fadeUp .3s ease ${si * 0.04}s both` }}>
              <span style={{ fontSize: 15 }}>{sec.icon}</span>
              <span style={{ flex: 1, fontSize: 12, color: "rgba(255,255,255,0.75)", fontWeight: 600 }}>{sec.label}</span>
              <div style={{ width: 60, height: 5, background: "rgba(255,255,255,0.06)", borderRadius: 999, overflow: "hidden" }}>
                <div style={{ width: p + "%", height: "100%", background: p === 100 ? C.green : p >= 60 ? C.blue : C.coral, borderRadius: 999, transition: "width .6s" }} />
              </div>
              <span style={{ fontSize: 12, fontWeight: 700, color: "#fff", minWidth: 36, textAlign: "right", fontFamily: "'JetBrains Mono',monospace" }}>{pts}/{sec.total}</span>
            </div>
          );
        })}
      </div>
      <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14, padding: "20px", marginBottom: 20 }}>
        <div style={{ fontSize: 11, fontWeight: 800, color: C.orange, textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 8 }}>Your Completion Code</div>
        <div style={{ fontSize: 26, fontWeight: 900, fontFamily: "'JetBrains Mono',monospace", color: "#fff", letterSpacing: ".1em", marginBottom: 12 }}>{code}</div>
        <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginBottom: 14 }}>Share this code with Mr. Omar or copy your full results below.</div>
        <button onClick={copyResults} style={{ padding: "10px 28px", fontSize: 13, fontWeight: 700, border: `1px solid ${C.teal}`, borderRadius: 999, background: copied ? `${C.green}20` : "transparent", color: copied ? C.green : C.teal, cursor: "pointer", transition: "all .3s" }}>
          {copied ? "✓ Copied to Clipboard!" : "📋 Copy Full Results"}
        </button>
      </div>
      <button onClick={onRestart} style={{ padding: "12px 36px", fontSize: 14, fontWeight: 700, border: "1px solid rgba(255,255,255,0.12)", borderRadius: 999, background: "transparent", color: "rgba(255,255,255,0.5)", cursor: "pointer" }}>↻ Try Again</button>
    </div>
  );
}

// ─── APP ────────────────────────────────────────────────────────────────────

function App() {
  const [section, setSection] = useState(0);
  const [studentName, setStudentName] = useState("");
  const [score, setScore] = useState({
    warmup:0, arcsin_table:0, arcsin_eval:0, arccos_table:0, arccos_eval:0,
    arctan_table:0, arctan_eval:0, domain_range:0, calculator:0, properties:0,
    composites:0, algebraic:0, application:0, mixed:0, exit:0
  });
  const next = () => setSection(s => Math.min(s + 1, SECTIONS.length - 1));
  const restart = () => { setSection(0); setScore({warmup:0,arcsin_table:0,arcsin_eval:0,arccos_table:0,arccos_eval:0,arctan_table:0,arctan_eval:0,domain_range:0,calculator:0,properties:0,composites:0,algebraic:0,application:0,mixed:0,exit:0}); };
  useEffect(() => { const el = document.getElementById("ws-top"); if (el) el.scrollIntoView({ behavior: "smooth" }); }, [section]);

  const sIdx = SECTIONS[section];

  return (
    <div id="ws-top" style={{ maxWidth: 700, margin: "0 auto", padding: "32px 20px 60px" }}>
      {section > 0 && section < SECTIONS.length - 1 && (
        <div style={{ marginBottom: 20 }}>
          <SectionNav idx={section} onNav={setSection} />
          <div style={{ marginTop: 8 }}><ProgressBar current={section} total={SECTIONS.length} /></div>
        </div>
      )}

      {sIdx === "welcome" && <Welcome onNext={next} studentName={studentName} setStudentName={setStudentName} />}

      {sIdx === "warmup" && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="warmup" questions={WARMUP_QUESTIONS} icon="🔥" title="Warm-Up: What Does Inverse Mean?" subtitle="Quick review from Unit 2 — why can't we just invert trig functions directly?" part="Warm-Up" showExplanation />}

      {sIdx === "arcsin_table" && (
        <TableFillSection onNext={next} score={score} setScore={setScore} scoreKey="arcsin_table"
          angles={ARCSIN_TABLE_ANGLES} valueKey="sinVal" fnName="sine"
          icon="📊" title="Table: sin(θ) on Restricted Domain" subtitle="Fill in the sine values for each angle in [−π/2, π/2]."
          part="Part 1: Inverse Sine" color={C.blue}
          circleAngles={[270, 90]} restrictedLabel="[−π/2, π/2]"
        />
      )}

      {sIdx === "arcsin_eval" && (
        <MCSection onNext={next} score={score} setScore={setScore} scoreKey="arcsin_eval" questions={ARCSIN_EVAL}
          icon="🎯" title="Evaluate sin⁻¹(x)" subtitle="Find the angle in [−π/2, π/2] whose sine equals the given value."
          part="Part 1: Inverse Sine" showExplanation
          extraContent={
            <Callout color={C.blue} title="Workflow">
              1. Let θ = sin⁻¹(x)  →  2. Rewrite: sin θ = x  →  3. Find θ in [−π/2, π/2] with that sine value
            </Callout>
          }
        />
      )}

      {sIdx === "arccos_table" && (
        <TableFillSection onNext={next} score={score} setScore={setScore} scoreKey="arccos_table"
          angles={ARCCOS_TABLE_ANGLES} valueKey="cosVal" fnName="cosine"
          icon="📊" title="Table: cos(θ) on Restricted Domain" subtitle="Fill in the cosine values for each angle in [0, π]."
          part="Part 2: Inverse Cosine" color={C.green}
          circleAngles={[0, 180]} restrictedLabel="[0, π]"
        />
      )}

      {sIdx === "arccos_eval" && (
        <MCSection onNext={next} score={score} setScore={setScore} scoreKey="arccos_eval" questions={ARCCOS_EVAL}
          icon="🎯" title="Evaluate cos⁻¹(x)" subtitle="Find the angle in [0, π] whose cosine equals the given value."
          part="Part 2: Inverse Cosine" showExplanation
          extraContent={
            <Callout color={C.green} title="Key Insight">
              cos⁻¹ outputs angles in Q I or Q II. Negative cosine values → Q II angles (between π/2 and π).
            </Callout>
          }
        />
      )}

      {sIdx === "arctan_table" && (
        <TableFillSection onNext={next} score={score} setScore={setScore} scoreKey="arctan_table"
          angles={ARCTAN_TABLE_ANGLES} valueKey="tanVal" fnName="tangent"
          icon="📊" title="Table: tan(θ) on Restricted Domain" subtitle="Fill in the tangent values for each angle in (−π/2, π/2)."
          part="Part 3: Inverse Tangent" color={C.orange}
          circleAngles={[270, 90]} restrictedLabel="(−π/2, π/2)"
        />
      )}

      {sIdx === "arctan_eval" && (
        <MCSection onNext={next} score={score} setScore={setScore} scoreKey="arctan_eval" questions={ARCTAN_EVAL}
          icon="🎯" title="Evaluate tan⁻¹(x)" subtitle="Find the angle in (−π/2, π/2) whose tangent equals the given value."
          part="Part 3: Inverse Tangent" showExplanation
          extraContent={
            <Callout color={C.orange} title="Remember">
              tan⁻¹ accepts ANY real number! Its range is (−π/2, π/2) with open parentheses. Horizontal asymptotes at y = ±π/2.
            </Callout>
          }
        />
      )}

      {sIdx === "domain_range" && (
        <MCSection onNext={next} score={score} setScore={setScore} scoreKey="domain_range" questions={DOMAIN_RANGE_Q}
          icon="📏" title="Domain, Range & Quadrants" subtitle="Know these cold — they tell you which quadrant the answer lives in!"
          part="Summary" showExplanation
          extraContent={
            <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 14, padding: "16px", marginBottom: 20 }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: C.purple, textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 12 }}>Side-by-Side Comparison</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                {[
                  { name: "sin⁻¹(x)", domain: "[−1, 1]", range: "[−π/2, π/2]", quads: "Q I & IV", color: C.blue },
                  { name: "cos⁻¹(x)", domain: "[−1, 1]", range: "[0, π]", quads: "Q I & II", color: C.green },
                  { name: "tan⁻¹(x)", domain: "(−∞, ∞)", range: "(−π/2, π/2)", quads: "Q I & IV", color: C.orange },
                ].map((f, i) => (
                  <div key={i} style={{ background: f.color + "10", border: `1px solid ${f.color}30`, borderRadius: 10, padding: "12px 10px", textAlign: "center" }}>
                    <div style={{ fontSize: 14, fontWeight: 800, color: f.color, marginBottom: 8, fontFamily: "'JetBrains Mono',monospace" }}>{f.name}</div>
                    <div style={{ fontSize: 10, color: "rgba(255,255,255,0.5)", marginBottom: 2 }}>Domain</div>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "#fff", marginBottom: 6 }}>{f.domain}</div>
                    <div style={{ fontSize: 10, color: "rgba(255,255,255,0.5)", marginBottom: 2 }}>Range</div>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "#fff", marginBottom: 6 }}>{f.range}</div>
                    <div style={{ fontSize: 10, color: "rgba(255,255,255,0.5)", marginBottom: 2 }}>Quadrants</div>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "#fff" }}>{f.quads}</div>
                  </div>
                ))}
              </div>
            </div>
          }
        />
      )}

      {sIdx === "calculator" && (
        <MCSection onNext={next} score={score} setScore={setScore} scoreKey="calculator" questions={CALCULATOR_Q}
          icon="🔢" title="Calculator Approximations" subtitle="When the input isn't a standard unit-circle value, use your calculator (RADIAN mode!)."
          showExplanation
          extraContent={
            <Callout color={C.coral} title="RADIAN Mode!">
              Make sure your calculator is set to <strong>RADIAN</strong>, not degree! An error message means the input is outside the domain.
            </Callout>
          }
        />
      )}

      {sIdx === "properties" && <PropertiesSection onNext={next} score={score} setScore={setScore} />}

      {sIdx === "composites" && <CompositesSection onNext={next} score={score} setScore={setScore} />}

      {sIdx === "algebraic" && (
        <MCSection onNext={next} score={score} setScore={setScore} scoreKey="algebraic" questions={ALGEBRAIC_Q}
          icon="✏️" title="Write as Algebraic Expressions" subtitle="Convert trig(inverse trig(x)) into pure algebra using right triangles."
          part="Part 5: Composites (continued)" showExplanation
          extraContent={
            <div style={{ display: "flex", gap: 12, flexWrap: "wrap", justifyContent: "center", marginBottom: 20 }}>
              <div style={{ flex: "0 0 180px" }}>
                <div style={{ fontSize: 10, color: C.indigo, fontWeight: 700, textAlign: "center", marginBottom: 4 }}>Generic Triangle for cos⁻¹(x)</div>
                <RightTriangleSVG opp="√(1−x²)" adj="x" hyp="1" color={C.green} />
              </div>
              <div style={{ flex: "0 0 180px" }}>
                <div style={{ fontSize: 10, color: C.indigo, fontWeight: 700, textAlign: "center", marginBottom: 4 }}>Generic Triangle for sin⁻¹(x)</div>
                <RightTriangleSVG opp="x" adj="√(1−x²)" hyp="1" color={C.blue} />
              </div>
            </div>
          }
        />
      )}

      {sIdx === "application" && (
        <MCSection onNext={next} score={score} setScore={setScore} scoreKey="application" questions={APPLICATION_Q}
          icon="✈️" title="Real-World Applications" subtitle="Inverse trig is the tool for finding unknown angles from known sides."
          part="Part 6: Applications" showExplanation
          extraContent={
            <Callout color={C.teal} title="Key Idea">
              When you know side lengths and need to find an <strong>angle</strong>, use inverse trig! Set up the ratio (SOH-CAH-TOA), then apply the inverse function.
            </Callout>
          }
        />
      )}

      {sIdx === "mixed" && (
        <MCSection onNext={next} score={score} setScore={setScore} scoreKey="mixed" questions={MIXED_PRACTICE}
          icon="🔥" title="Mixed Practice" subtitle="Everything combined! Show what you've learned across all topics."
          showExplanation={false}
        />
      )}

      {sIdx === "exit" && <ExitTicketSection onNext={next} score={score} setScore={setScore} />}

      {sIdx === "results" && <ResultsSection score={score} studentName={studentName} onRestart={restart} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
