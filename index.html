function UnitCircleDiagram({ highlight, showAngles }) {
  const angles = [0, 30, 45, 60, 90, 120, 135, 150, 180, 210, 225, 240, 270, 300, 315, 330];
  const specialAngles = {
    0: "0", 30: "π/6", 45: "π/4", 60: "π/3", 90: "π/2",
    120: "2π/3", 135: "3π/4", 150: "5π/6", 180: "π",
    210: "7π/6", 225: "5π/4", 240: "4π/3", 270: "3π/2",
    300: "5π/3", 315: "7π/4", 330: "11π/6"
  };
  const cx = 150, cy = 150, r = 110;
  return (
    <svg viewBox="0 0 300 300" style={{ width: "100%", maxWidth: 280 }}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.navy} strokeWidth="2" />
      <line x1={30} y1={cy} x2={270} y2={cy} stroke={C.border} strokeWidth="1" />
      <line x1={cx} y1={30} x2={cx} y2={270} stroke={C.border} strokeWidth="1" />
      {highlight && (
        <path d={`M ${cx} ${cy} L ${cx + r * Math.cos(-highlight.from * Math.PI / 180)} ${cy + r * Math.sin(-highlight.from * Math.PI / 180)} A ${r} ${r} 0 ${Math.abs(highlight.to - highlight.from) > 180 ? 1 : 0} ${highlight.to > highlight.from ? 0 : 1} ${cx + r * Math.cos(-highlight.to * Math.PI / 180)} ${cy + r * Math.sin(-highlight.to * Math.PI / 180)} Z`}
          fill={highlight.color || C.blue} fillOpacity="0.15" stroke={highlight.color || C.blue} strokeWidth="2" />
      )}
      {showAngles && angles.map(a => {
        const rad = a * Math.PI / 180;
        const px = cx + r * Math.cos(rad);
        const py = cy - r * Math.sin(rad);
        const lx = cx + (r + 22) * Math.cos(rad);
        const ly = cy - (r + 22) * Math.sin(rad);
        return (
          <g key={a}>
            <circle cx={px} cy={py} r="3" fill={C.navy} />
            <text x={lx} y={ly} textAnchor="middle" dominantBaseline="middle" fontSize="8" fill={C.muted}>{specialAngles[a]}</text>
          </g>
        );
      })}
      <text x={cx} y={cy + r + 18} textAnchor="middle" fontSize="9" fill={C.muted}>Unit Circle</text>
    </svg>
  );
}

function InverseFunctionGraph({ fn, color, label, domain, range, asymptotes }) {
  const w = 260, h = 200, pad = 35;
  const pw = w - 2 * pad, ph = h - 2 * pad;
  const xMin = domain[0], xMax = domain[1], yMin = range[0], yMax = range[1];
  const toX = v => pad + (v - xMin) / (xMax - xMin) * pw;
  const toY = v => pad + (yMax - v) / (yMax - yMin) * ph;
  const points = [];
  const steps = 100;
  for (let i = 0; i <= steps; i++) {
    const x = xMin + (xMax - xMin) * i / steps;
    const y = fn(x);
    if (y !== null && isFinite(y) && y >= yMin && y <= yMax) {
      points.push(`${toX(x).toFixed(1)},${toY(y).toFixed(1)}`);
    }
  }
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", maxWidth: 260 }}>
      <rect x={pad} y={pad} width={pw} height={ph} fill={C.lightBlue} fillOpacity="0.3" rx="3" />
      <line x1={pad} y1={toY(0)} x2={w - pad} y2={toY(0)} stroke={C.border} strokeWidth="1" />
      <line x1={toX(0)} y1={pad} x2={toX(0)} y2={h - pad} stroke={C.border} strokeWidth="1" />
      {asymptotes && asymptotes.map((a, i) => (
        <line key={i} x1={a.axis === "y" ? toX(a.value) : pad} y1={a.axis === "y" ? pad : toY(a.value)}
          x2={a.axis === "y" ? toX(a.value) : w - pad} y2={a.axis === "y" ? h - pad : toY(a.value)}
          stroke={C.red} strokeWidth="1" strokeDasharray="4,3" />
      ))}
      <polyline points={points.join(" ")} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" />
      <text x={w / 2} y={h - 5} textAnchor="middle" fontSize="10" fontWeight="600" fill={color}>{label}</text>
      <text x={w - pad + 5} y={toY(0) - 4} fontSize="8" fill={C.muted}>x</text>
      <text x={toX(0) + 5} y={pad - 5} fontSize="8" fill={C.muted}>y</text>
    </svg>
  );
}

function RightTriangle({ adj, opp, hyp, angle, color }) {
  const w = 180, h = 140;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", maxWidth: 180 }}>
      <polygon points="20,120 150,120 150,30" fill="none" stroke={color || C.navy} strokeWidth="2" strokeLinejoin="round" />

      <text x="75" y="68" textAnchor="middle" fontSize="11" fontWeight="600" fill={color || C.navy}>{hyp}</text>
      {angle && <text x="38" y="112" fontSize="10" fill={C.green}>{angle}</text>}
    </svg>
  );
}

    prompt: "Therefore sin(cos⁻¹(5/13)) = ?",

    explanation: "sin(θ) = opp/hyp = 12/13."
  },

    prompt: "Find: sin(tan⁻¹(4/3)). First, what is the hypotenuse?",
    choices: ["7", "√7", "5", "25"],
    answer: 2,
    explanation: "opp = 4, adj = 3. hyp = √(16 + 9) = √25 = 5."
  },
  { section: "sec6", id: "q43", type: "mc",
    prompt: "Therefore sin(tan⁻¹(4/3)) = ?",
    choices: ["3/5", "4/5", "4/3", "3/4"],
    answer: 1,
    explanation: "sin(θ) = opp/hyp = 4/5."
  },
  { section: "sec6", id: "q44", type: "mc",
    prompt: "Write sin(cos⁻¹(x)) as an algebraic expression (0 < x ≤ 1):",
    choices: ["√(1 - x²)", "1 - x", "x/√(1-x²)", "√(x² - 1)"],
    answer: 0,
    explanation: "cos(θ) = x → adj = x, hyp = 1. opp = √(1-x²). So sin(θ) = opp/hyp = √(1-x²)."
  },

  // SEC 7: APPLICATIONS
  { section: "sec7", id: "q45", type: "mc",
    prompt: "An airplane is at altitude 5 mi, horizontal distance x mi. Which expression gives the angle of elevation θ?",

  },
  { section: "sec7", id: "q48", type: "mc",
    prompt: "Given f(x) = 3sin(x) - 1, what is f⁻¹(x)?",

    answer: 2,

  },

                <tr style={{ background: "#f9fafb" }}><td style={styles.td}>cos⁻¹(cos(x)) = x</td><td style={{ ...styles.td, fontWeight: 700, color: C.red }}>[0, π]</td></tr>
                <tr><td style={styles.td}>tan(tan⁻¹(x)) = x</td><td style={styles.td}>All reals</td></tr>
                <tr style={{ background: "#f9fafb" }}><td style={styles.td}>tan⁻¹(tan(x)) = x</td><td style={{ ...styles.td, fontWeight: 700, color: C.red }}>(-π/2, π/2)</td></tr>
              </tbody>
            </table>
          </div>
          <div style={styles.infoBox(C.red)}>
            <strong>⚠️ CRITICAL RULE:</strong> If x is OUTSIDE the valid interval, <strong>DO NOT cancel!</strong> Instead:<br />
            1. Evaluate the <strong>inner</strong> function first<br />
            2. Then apply the <strong>outer</strong> inverse function to the result<br /><br />
            <em>Example: sin⁻¹(sin(2π/3)). Since 2π/3 ∉ [-π/2, π/2], first find sin(2π/3) = √3/2. Then sin⁻¹(√3/2) = π/3.</em>
          </div>
        </>
      ),
      sec6: (
        <>
          <div style={styles.infoBox(C.green)}>
            <strong>🎯 Goal:</strong> Evaluate composites like cos(sin⁻¹(x)) using the right triangle method.
          </div>
          <div style={styles.infoBox(C.navy)}>
            <strong>🔑 The Right Triangle Method:</strong><br />
            1. Let θ = [inner inverse trig]. This gives you a trig ratio (opp/hyp, adj/hyp, or opp/adj).<br />
            2. <strong>Draw a right triangle</strong> with those sides.<br />
            3. Use <strong>Pythagorean theorem</strong> to find the missing side.<br />
            4. Read the <strong>outer function</strong> from the triangle.
          </div>
          <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 16 }}>
            <div style={{ ...styles.visualBox, flex: "1 1 160px" }}>
              <p style={{ fontSize: 12, fontWeight: 600, color: C.green, margin: "0 0 4px" }}>Example: sin(cos⁻¹(5/13))</p>
              <RightTriangle adj="5" opp="12" hyp="13" angle="θ" color={C.green} />
              <p style={{ fontSize: 11, color: C.muted, margin: "4px 0 0" }}>cos θ = 5/13 → sin θ = 12/13</p>
            </div>
            <div style={{ ...styles.visualBox, flex: "1 1 160px" }}>
              <p style={{ fontSize: 12, fontWeight: 600, color: C.navy, margin: "0 0 4px" }}>Example: cos(sin⁻¹(-1/2))</p>
              <RightTriangle adj="√3" opp="-1" hyp="2" angle="θ" color={C.navy} />
              <p style={{ fontSize: 11, color: C.muted, margin: "4px 0 0" }}>sin θ = -1/2 → cos θ = √3/2</p>
            </div>
          </div>
        </>
      ),
      sec7: (
        <>
          <div style={styles.infoBox(C.blue)}>
            <strong>🎯 Goal:</strong> Apply inverse trig functions to real-world problems involving angles of elevation and right triangles.
          </div>
          <div style={styles.infoBox(C.navy)}>
            <strong>When do we use inverse trig in real life?</strong><br />
            Whenever we know side lengths and need to find an <strong>angle</strong>!<br /><br />
            • <strong>tan⁻¹</strong> — most common: when you have opposite and adjacent sides (angle of elevation/depression)<br />
            • <strong>sin⁻¹</strong> — when you have opposite and hypotenuse<br />
            • <strong>cos⁻¹</strong> — when you have adjacent and hypotenuse
          </div>
          <div style={{ ...styles.visualBox, marginBottom: 16 }}>
            <svg viewBox="0 0 300 160" style={{ width: "100%", maxWidth: 320 }}>
              <line x1="20" y1="130" x2="280" y2="130" stroke={C.border} strokeWidth="2" />
              <line x1="230" y1="130" x2="230" y2="40" stroke={C.navy} strokeWidth="2" />
              <line x1="40" y1="130" x2="230" y2="40" stroke={C.red} strokeWidth="2" strokeDasharray="6,3" />
              <rect x="222" y="122" width="8" height="8" fill="none" stroke={C.navy} strokeWidth="1.5" />
              <text x="240" y="88" fontSize="12" fill={C.navy} fontWeight="600">5 mi</text>
              <text x="125" y="148" fontSize="12" fill={C.muted}>x (horizontal)</text>
              <text x="55" y="122" fontSize="13" fill={C.green} fontWeight="600">θ</text>
              <path d="M 65 130 A 25 25 0 0 0 54 118" fill="none" stroke={C.green} strokeWidth="2" />
              <text x="220" y="30" fontSize="16">✈️</text>
              <text x="20" y="145" fontSize="14">🏠</text>
            </svg>
            <p style={{ fontSize: 12, color: C.muted, margin: "4px 0 0" }}>θ = tan⁻¹(5/x) — angle of elevation to airplane</p>
          </div>
        </>
      ),
    };

    return (
      <div>
        <div style={styles.card}>
          <div style={styles.sectionHeader(sec.color)}>
            <span style={styles.badge(sec.color)}>{sections.indexOf(sec)}</span>
            {sec.title}
          </div>
          {guideContent[sec.id] && <div style={{ marginTop: 16 }}>{guideContent[sec.id]}</div>}
        </div>
        {qs.length > 0 && (
          <div style={{ marginTop: 8 }}>
            <p style={{ fontSize: 13, fontWeight: 600, color: C.muted, marginBottom: 8, textTransform: "uppercase", letterSpacing: 1 }}>
              Questions ({qs.filter(q => revealed[q.id]).length}/{qs.length} completed)
            </p>
            {qs.map((q, i) => renderQuestion(q, globalIdx + i))}
          </div>
        )}
      </div>
    );
  };

  const renderResults = () => {
    const getGrade = (pct) => pct >= 90 ? "A" : pct >= 80 ? "B" : pct >= 70 ? "C" : pct >= 60 ? "D" : "F";
    const getEmoji = (pct) => pct >= 90 ? "🌟" : pct >= 80 ? "💪" : pct >= 70 ? "👍" : pct >= 60 ? "📚" : "🔄";
    const getMessage = (pct) => pct >= 90 ? "Outstanding work! You've mastered inverse trig!" : pct >= 80 ? "Great job! You have a strong understanding." : pct >= 70 ? "Good effort! Review the topics you missed." : pct >= 60 ? "You're getting there. Review the lesson notes and try again." : "Keep practicing! Go back through the lesson slides and retry.";
    
    const resultText = `Student: ${studentName}\nPeriod: ${studentPeriod}\nScore: ${correctCount}/${totalQ} (${score}%)\nGrade: ${getGrade(score)}\nDate: ${new Date().toLocaleDateString()}\n\nSection Breakdown:\n${sections.filter(s => sectionQuestions(s.id).length > 0).map(s => {
      const sc = sectionScore(s.id);
      return `  ${s.title}: ${sc.correct}/${sc.total} (${sc.pct}%)`;
    }).join("\n")}`;

    return (
      <div>
        {showConfetti && (
          <div style={{ textAlign: "center", fontSize: 48, animation: "fadeIn 0.5s", marginBottom: 8 }}>
            🎉🎊🎉
          </div>
        )}
        <div style={{ ...styles.card, textAlign: "center" }}>
          <div style={{ fontSize: 56, marginBottom: 8 }}>{getEmoji(score)}</div>
          <h2 style={{ color: C.navy, margin: 0 }}>Your Results</h2>
          <p style={{ color: C.muted, margin: "4px 0 16px" }}>{studentName} • Period {studentPeriod}</p>
          <div style={{ fontSize: 56, fontWeight: 800, color: score >= 70 ? C.green : C.red, margin: "8px 0" }}>{score}%</div>
          <div style={{ fontSize: 20, fontWeight: 700, color: C.navy }}>{correctCount} / {totalQ} correct — Grade: {getGrade(score)}</div>
          <p style={{ color: C.muted, marginTop: 8, fontSize: 14 }}>{getMessage(score)}</p>
        </div>

        <div style={styles.card}>
          <h3 style={{ color: C.navy, margin: "0 0 12px" }}>Section Breakdown</h3>
          {sections.filter(s => sectionQuestions(s.id).length > 0).map(s => {
            const sc = sectionScore(s.id);
            return (
              <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
                <div style={{ flex: "1 1 auto" }}>
                  <div style={{ fontSize: 13, fontWeight: 600 }}>{s.title}</div>
                  <div style={{ height: 8, background: "#e5e7eb", borderRadius: 4, marginTop: 4, overflow: "hidden" }}>
                    <div style={{ height: "100%", width: `${sc.pct}%`, background: sc.pct >= 70 ? C.green : sc.pct >= 50 ? C.gold : C.red, borderRadius: 4, transition: "width 1s ease" }} />
                  </div>
                </div>
                <div style={{ fontSize: 13, fontWeight: 700, color: sc.pct >= 70 ? C.green : C.red, minWidth: 60, textAlign: "right" }}>
                  {sc.correct}/{sc.total} ({sc.pct}%)
                </div>
              </div>
            );
          })}
        </div>

        {!submitted ? (
          <div style={{ ...styles.card, textAlign: "center" }}>
            <button style={{ ...styles.navBtn(true), padding: "14px 48px", fontSize: 16 }} onClick={handleSubmit}>
              ✅ Submit My Worksheet
            </button>
            <p style={{ fontSize: 12, color: C.muted, marginTop: 8 }}>This will record your score. You cannot change answers after submitting.</p>
          </div>
        ) : (
          <div style={{ ...styles.card, textAlign: "center", background: C.greenLight, borderColor: C.green }}>
            <div style={{ fontSize: 28, marginBottom: 8 }}>✅</div>
            <p style={{ fontWeight: 700, color: C.green, margin: 0 }}>Worksheet Submitted!</p>
            <p style={{ fontSize: 13, color: C.muted, margin: "8px 0 12px" }}>Your score has been recorded. You can copy your results below.</p>
            <button style={{ ...styles.navBtn(false), fontSize: 12, padding: "8px 20px" }}
              onClick={() => { navigator.clipboard.writeText(resultText).catch(() => {}); }}>
              📋 Copy Results to Clipboard
            </button>
          </div>
        )}
      </div>
    );
  };

  // ─── MAIN RENDER ───
  const sec = sections[currentSection];
  const isResults = sec.type === "results";
  const canProceed = currentSection === 0 || isResults || allSectionAnswered(sec.id) || sectionQuestions(sec.id).length === 0;

  return (
    <div style={styles.wrapper}>
      <div ref={topRef} />
      <div style={styles.header}>
        <h1 style={styles.headerTitle}>📐 Inverse Trigonometric Functions</h1>
        <div style={styles.headerSub}>Lesson 3.9 • {SCHOOL} • {TEACHER}</div>
        {started && (
          <div style={styles.progress}>
            {sections.map((s, i) => (
              <div key={i} style={styles.progressDot(i === currentSection, i < currentSection)} />
            ))}
          </div>
        )}
        {started && (
          <div style={{ fontSize: 11, marginTop: 6, opacity: 0.8 }}>
            {answeredCount}/{totalQ} answered • Score so far: {answeredCount > 0 ? `${Math.round(allQuestions.filter(q => answers[q.id] === q.answer).length / Math.max(Object.keys(revealed).length, 1) * 100)}%` : "—"}
          </div>
        )}
      </div>

      <div style={styles.container}>
        {!started && renderIntro()}
        {started && !isResults && renderSectionContent(sec)}
        {started && isResults && renderResults()}
      </div>

      {started && (
        <div style={styles.navBar}>
          <button style={styles.navBtn(false)}
            disabled={currentSection <= 1}
            onClick={() => setCurrentSection(p => Math.max(1, p - 1))}>
            ← Back
          </button>
          <span style={{ fontSize: 12, color: C.muted, fontWeight: 600 }}>
            {currentSection} / {sections.length - 1}
          </span>
          <button style={{ ...styles.navBtn(true), opacity: canProceed ? 1 : 0.4 }}
            disabled={!canProceed}
            onClick={() => setCurrentSection(p => Math.min(sections.length - 1, p + 1))}>
            {currentSection === sections.length - 2 ? "See Results →" : "Next →"}
          </button>
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(InverseTrigWorksheet));
</script>
</body>
</html>
